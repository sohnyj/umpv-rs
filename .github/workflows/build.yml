name: Build

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - name: Install LLVM
        run: sudo apt-get install -y llvm

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Clippy
        run: cargo xwin clippy --release --target x86_64-pc-windows-msvc -- -D warnings

      - name: Build
        run: cargo xwin build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: umpv.exe
          path: target/x86_64-pc-windows-msvc/release/umpv.exe
