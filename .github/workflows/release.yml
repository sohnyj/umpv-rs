name: Release

on:
  workflow_dispatch:
    inputs:
      auto_tag:
        description: "Read version from Cargo.toml"
        type: boolean
        default: true
      version:
        description: "Manual version (e.g. v0.1.1). Used when auto_tag is off."
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ inputs.auto_tag }}" = "true" ]; then
            echo "tag=v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        run: sudo apt-get install -y llvm

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Build
        run: cargo xwin build --release --target x86_64-pc-windows-msvc

      - name: Compress
        working-directory: target/x86_64-pc-windows-msvc/release
        run: 7z a -mx=9 ${{ github.workspace }}/umpv-rust.7z umpv.exe

      - name: Remove existing release/tag if it already exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release '$TAG' already exists — deleting it before re-releasing."
            gh release delete "$TAG" --cleanup-tag --yes
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag '$TAG' already exists (no release) — deleting it."
            git push origin ":refs/tags/$TAG"
          else
            echo "No existing release/tag for '$TAG' — nothing to clean up."
          fi

      - name: Build release notes from commit log
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            echo "Generating notes for range $PREV_TAG..HEAD"
            git log "$PREV_TAG..HEAD" --no-merges --pretty=format:'- %s (%h)' > RELEASE_NOTES.md
          else
            echo "No previous tag found — listing all commits"
            git log --no-merges --pretty=format:'- %s (%h)' > RELEASE_NOTES.md
          fi
          echo "" >> RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ github.workspace }}/umpv-rust.7z" \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md
